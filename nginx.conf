server {
    listen 80;
    root /usr/share/nginx/html;

    location = / {
        try_files /index.html =404;
    }

    location = /index.html {
        return 301 /;
    }

    location ~* ^(.+)\.html$ {
        return 301 $1;
    }

    location / {
        try_files $uri $uri.html =404;
    }
}
